name: ci

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt pyinstaller
      - run: playwright install chromium
      - run: pyinstaller build.spec --distpath dist --workpath build --noconfirm
      - run: |
          New-Item -ItemType Directory -Force -Path "dist\xhs-hot"
          Move-Item -Force -Path "dist\xhs-hot.exe" -Destination "dist\xhs-hot\xhs-hot.exe"
          Set-Content -Path "dist\xhs-hot\start.bat" -Value "@echo off`nchcp 65001 >nul`ntitle 小红书热点收集器`ncd /d `"%~dp0`"`nstart http://127.0.0.1:5000`n%~dp0xhs-hot.exe`npause"
      - run: Compress-Archive -Path "dist\xhs-hot\*" -DestinationPath "xhs-hot.zip"
      - uses: actions/upload-artifact@v4
        with:
          name: xhs-hot
          path: xhs-hot.zip
      - if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: xhs-hot.zip

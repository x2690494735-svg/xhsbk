name: build-exe

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install -r requirements.txt pyinstaller

      - name: Build
        run: pyinstaller build.spec --distpath dist --workpath build --noconfirm

      - name: Create launcher
        run: |
          New-Item -ItemType Directory -Force -Path "dist\xhs-hot"
          Set-Content -Path "dist\xhs-hot\start.bat" -Value "@echo off`n%~dp0xhs-hot.exe`npause"

      - name: Zip
        run: Compress-Archive -Path "dist\xhs-hot\*" -DestinationPath "xhs-hot.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: xhs-hot
          path: xhs-hot.zip

      - name: Create release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: xhs-hot.zip
          generate_release_notes: true

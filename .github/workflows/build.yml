name: 构建 exe

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 安装依赖
        run: pip install -r requirements.txt pyinstaller

      - name: PyInstaller 打包
        run: pyinstaller build.spec --distpath dist --workpath build --noconfirm

      - name: 创建启动器
        run: |
          "@echo off`n`%~dp0小红书热点收集器.exe`npause" | Out-File -FilePath "dist\小红书热点收集器\启动.bat" -Encoding Default

      - name: 打包为 zip
        run: Compress-Archive -Path "dist\小红书热点收集器\*" -DestinationPath "小红书热点收集器.zip"

      - name: 上传 Artifact
        uses: actions/upload-artifact@v4
        with:
          name: 小红书热点收集器
          path: 小红书热点收集器.zip

      - name: 创建 Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: 小红书热点收集器.zip
          generate_release_notes: true

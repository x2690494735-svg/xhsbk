name: "构建 exe"

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: pip install -r requirements.txt pyinstaller
      - name: Build exe
        run: pyinstaller --onedir --name xhs-hot --add-data "templates;templates" --add-data "config.yaml;." --collect-all playwright --collect-all greenlet --hidden-import flask --hidden-import flask.json --hidden-import jinja2 --hidden-import jinja2.ext --hidden-import yaml --hidden-import pyee --hidden-import pyee.asyncio --exclude-module tkinter --exclude-module matplotlib --exclude-module numpy --noconfirm --distpath dist --workpath build app.py
      - name: Create launcher
        run: |
          New-Item -ItemType Directory -Force -Path "dist\xhs-hot"
          Set-Content -Path "dist\xhs-hot\启动.bat" -Value "@echo off`nstart http://127.0.0.1:5000`n`%~dp0xhs-hot.exe`npause"
      - name: Zip
        run: Compress-Archive -Path "dist\xhs-hot\*" -DestinationPath "xhs-hot.zip"
      - uses: actions/upload-artifact@v4
        with:
          name: xhs-hot
          path: xhs-hot.zip
      - name: Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: xhs-hot.zip
          generate_release_notes: true

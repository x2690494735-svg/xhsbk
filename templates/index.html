<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="referrer" content="no-referrer">
<title>小红书热点收集器</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #050508;
    --surface: rgba(10,10,18,0.75);
    --card-bg: rgba(14,14,24,0.6);
    --border: rgba(255,255,255,0.05);
    --border-hover: rgba(200,168,96,0.25);
    --text: #c8c8d0;
    --sub: #5e5e6e;
    --gold: #c8a860;
    --gold-light: #e0c878;
    --red: #e04050;
  }
  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }

  canvas#bg { position:fixed; top:0; left:0; width:100%; height:100%; z-index:0; pointer-events:none; }

  .nebula {
    position:fixed; top:-40%; left:-20%; width:140%; height:140%; z-index:0;
    pointer-events:none; opacity:0.12;
    background: radial-gradient(ellipse at 30% 20%, rgba(200,168,96,0.25) 0%, transparent 50%),
                radial-gradient(ellipse at 70% 60%, rgba(100,120,180,0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 80%, rgba(180,100,120,0.1) 0%, transparent 40%);
  }

  .container { max-width: 1200px; margin:0 auto; padding: 28px 24px; position:relative; z-index:2; }

  ::-webkit-scrollbar { width:5px; }
  ::-webkit-scrollbar-track { background:transparent; }
  ::-webkit-scrollbar-thumb { background:#1a1a28; border-radius:3px; }
  ::-webkit-scrollbar-thumb:hover { background:#2a2a3a; }

  header { padding: 48px 0 8px; }
  header h1 {
    font-family: "Noto Serif SC", "STSong", "SimSun", serif;
    font-size: 36px;
    font-weight: 700;
    color: #e8d8b0;
    letter-spacing: 4px;
  }
  header h1 .star {
    display:inline-block; width:7px; height:7px; background:var(--gold-light);
    border-radius:50%; margin-left:8px; vertical-align:super;
    box-shadow: 0 0 8px var(--gold), 0 0 20px rgba(200,168,96,.4);
    animation: twinkle 2.5s ease infinite;
  }
  @keyframes twinkle { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(.7)} }
  header p { color: var(--sub); margin-top: 10px; font-size: 13px; letter-spacing: 3px; }

  .controls { display:flex; gap:12px; flex-wrap:wrap; align-items:center; margin: 32px 0 20px; }

  .kw-bar { display:flex; gap:8px; flex-wrap:wrap; align-items:center; flex:1; }
  .kw-tag {
    background: var(--surface); backdrop-filter: blur(12px);
    border: 1px solid var(--border); border-radius: 20px;
    padding: 5px 14px; font-size: 13px; cursor: pointer; transition: .25s;
    display:flex; align-items:center; gap:4px; color:var(--text);
  }
  .kw-tag:hover { border-color: rgba(200,168,96,.4); background: rgba(20,20,30,0.85); }
  .kw-tag .del { color: var(--sub); font-size: 16px; line-height:1; transition:.2s; }
  .kw-tag .del:hover { color: var(--red); }
  .kw-add { display:flex; gap:4px; }
  .kw-add input {
    background: var(--surface); backdrop-filter: blur(12px);
    border: 1px dashed var(--border); border-radius: 20px;
    padding: 5px 12px; font-size: 13px; width: 100px; outline: none;
    color: var(--text); transition: .25s;
  }
  .kw-add input:focus { border-color: var(--gold); width: 130px; }
  .kw-add button {
    background: linear-gradient(135deg, var(--gold), #a08040);
    color: #1a1a14; border: none; border-radius: 20px;
    padding: 5px 13px; font-size: 13px; cursor: pointer; white-space: nowrap; transition: .2s; font-weight:600;
  }
  .kw-add button:hover { filter: brightness(1.1); }

  .actions { display:flex; gap:8px; align-items:center; }
  .btn-crawl {
    background: linear-gradient(135deg, var(--gold), #a08040);
    color: #141410; border: none; padding: 10px 36px; font-size: 15px; font-weight: 700;
    border-radius: 24px; cursor: pointer; transition: .25s; letter-spacing: 2px;
    position:relative; overflow:hidden;
  }
  .btn-crawl::after {
    content:''; position:absolute; top:-50%; left:-50%; width:200%; height:200%;
    background: radial-gradient(circle, rgba(255,255,255,.25) 0%, transparent 60%);
    opacity:0; transition: opacity .3s;
  }
  .btn-crawl:hover::after { opacity:1; }
  .btn-crawl:hover { transform:translateY(-2px); box-shadow:0 8px 30px rgba(200,168,96,.3); }
  .btn-crawl:disabled { background: #1a1a20; color: #444; cursor:not-allowed; transform:none; box-shadow:none; }
  .btn-crawl:disabled::after { display:none; }
  .btn-history {
    background: var(--surface); backdrop-filter: blur(12px);
    border: 1px solid var(--border); color: var(--sub);
    padding: 10px 20px; font-size: 13px; border-radius: 24px; cursor: pointer; transition: .25s; letter-spacing: 1px;
  }
  .btn-history:hover { color: var(--gold-light); border-color: rgba(200,168,96,.3); }

  .status-bar { text-align:center; padding:12px 0; font-size:14px; color:var(--sub); min-height:20px; transition:.3s; letter-spacing:1px; }
  .status-bar.active { color: var(--gold-light); }
  .pulse { display:none; width:6px; height:6px; background:var(--gold-light); border-radius:50%; margin-right:8px; vertical-align:middle; box-shadow:0 0 6px var(--gold); animation:pulse 1s ease infinite; }
  .active .pulse { display:inline-block; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.2} }

  .sort-bar { display:none; justify-content:flex-end; gap:6px; margin-bottom:18px; }
  .sort-bar button {
    background:none; border:1px solid var(--border); color:var(--sub);
    padding:5px 16px; font-size:12px; border-radius:16px; cursor:pointer; transition:.25s; letter-spacing:1px;
  }
  .sort-bar button:hover { color:var(--text); border-color:rgba(255,255,255,.15); }
  .sort-bar button.on { background:rgba(200,168,96,.1); color:var(--gold-light); border-color:rgba(200,168,96,.35); }

  .stats { display:none; justify-content:center; gap:56px; margin-bottom:32px; padding:22px 0; border-bottom:1px solid var(--border); border-top:1px solid var(--border); }
  .stat-item { text-align:center; }
  .stat-num {
    font-family: "Noto Serif SC", "Georgia", serif;
    font-size:42px; font-weight:400; color:var(--gold-light);
    font-variant-numeric:tabular-nums; font-feature-settings:"tnum";
  }
  .stat-num.hot { color: var(--gold-light); text-shadow:0 0 20px rgba(200,168,96,.3); }
  .stat-label { font-size:11px; color:var(--sub); margin-top:4px; letter-spacing:3px; text-transform:uppercase; }

  .grid { display:grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap:22px; }

  .card {
    background: var(--card-bg); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
    border-radius: 12px; overflow: hidden; transition: .4s cubic-bezier(.22,.61,.36,1);
    cursor: pointer; border: 1px solid var(--border); position: relative;
    opacity:0; transform:translateY(24px);
  }
  .card.visible { opacity:1; transform:translateY(0); }
  .card:hover {
    transform:translateY(-5px);
    border-color: var(--border-hover);
    box-shadow: 0 16px 48px rgba(0,0,0,.5), 0 0 0 1px rgba(200,168,96,.08) inset;
  }
  .card-rank {
    position:absolute; top:12px; left:12px; z-index:2;
    width:28px; height:28px; border-radius:6px;
    display:flex; align-items:center; justify-content:center;
    font-size:12px; font-weight:700; color:#fff;
    background:rgba(0,0,0,.5); backdrop-filter:blur(6px);
  }
  .card-rank.top1 { background:linear-gradient(135deg,#d4b060,#8a6a20); color:#faf5e8; box-shadow:0 2px 16px rgba(200,168,96,.35); }
  .card-rank.top2 { background:linear-gradient(135deg,#8899aa,#556677); color:#eef; }
  .card-rank.top3 { background:linear-gradient(135deg,#b88860,#7a5030); color:#f5eee0; }

  .card-cover { width:100%; height:190px; object-fit:cover; background:#0e0e16; display:block; }
  .card-cover-fallback {
    width:100%; height:190px;
    background: linear-gradient(135deg, #101018 0%, #161622 50%, #0e0e16 100%);
    display:flex; align-items:center; justify-content:center;
    color: #242430; font-size:44px;
  }
  .card-body { padding: 18px; }
  .card-title {
    font-size:15px; font-weight:600; line-height:1.65; color:#d8d8e0;
    display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;
  }
  .card-meta { display:flex; gap:22px; margin-top:12px; font-size:13px; color:var(--sub); font-feature-settings:"tnum"; }
  .card-meta span { display:flex; align-items:center; gap:5px; }
  .card-footer { display:flex; justify-content:space-between; align-items:center; margin-top:14px; padding-top:14px; border-top:1px solid var(--border); }
  .card-author { font-size:13px; color:#666; }
  .card-author em { font-style:normal; color:var(--gold); margin-right:1px; }
  .card-kw { font-size:11px; background:rgba(200,168,96,.08); color:var(--gold-light); padding:3px 10px; border-radius:10px; letter-spacing:1px; }
  .card-desc { display:none; margin-top:14px; padding-top:14px; border-top:1px solid var(--border); font-size:13px; line-height:1.8; color:#a0a0b0; max-height:300px; overflow-y:auto; white-space:pre-wrap; }
  .card.expanded .card-desc { display:block; }
  .card-expand-hint { font-size:11px; color:var(--gold); margin-top:8px; text-align:center; letter-spacing:1px; display:none; }
  .card.has-desc .card-expand-hint { display:block; }
  .card.expanded .card-expand-hint { display:none; }
  .card-ext-link { display:block; margin-top:12px; padding:8px 0; text-align:center; color:var(--gold); font-size:12px; text-decoration:none; letter-spacing:1px; border-top:1px solid var(--border); }
  .card-ext-link:hover { color:var(--gold-light); }

  .empty-state { text-align:center; padding:120px 0; color:var(--sub); }
  .empty-orb {
    width:90px; height:90px; border:1px solid rgba(200,168,96,.2); border-radius:50%;
    margin:0 auto 28px; position:relative;
    animation: orb-float 6s ease infinite;
    box-shadow: 0 0 60px rgba(200,168,96,.06), inset 0 0 30px rgba(200,168,96,.04);
  }
  .empty-orb::before {
    content:''; position:absolute; top:15px; left:15px; right:15px; bottom:15px;
    border:1px solid rgba(200,168,96,.3); border-radius:50%;
    box-shadow: 0 0 12px rgba(200,168,96,.1);
  }
  .empty-orb::after {
    content:''; position:absolute; top:30px; left:30px; right:30px; bottom:30px;
    background:radial-gradient(circle, rgba(200,168,96,.15) 0%, transparent 70%);
    border-radius:50%; animation: orb-glow 2s ease infinite alternate;
  }
  @keyframes orb-float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
  @keyframes orb-glow { from{opacity:.5} to{opacity:1} }
  .empty-state p { font-size:14px; letter-spacing:2px; }

  .overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,.6); z-index:99; backdrop-filter:blur(6px); }
  .overlay.show { display:block; }
  .panel {
    position:fixed; right:0; top:0; width:380px; height:100%;
    background:rgba(8,8,16,0.96); backdrop-filter:blur(24px);
    border-left:1px solid var(--border);
    z-index:100; overflow-y:auto; transform:translateX(100%); transition:.4s cubic-bezier(.22,.61,.36,1);
  }
  .panel.show { transform:translateX(0); }
  .panel-header { padding:24px 20px; display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid var(--border); position:sticky; top:0; background:rgba(8,8,16,0.98); backdrop-filter:blur(24px); }
  .panel-header strong { color:var(--gold-light); font-size:16px; letter-spacing:1px; }
  .panel-close { background:none; border:none; font-size:22px; cursor:pointer; color:var(--sub); transition:.2s; }
  .panel-close:hover { color:var(--text); }
  .panel-item { padding:16px 20px; border-bottom:1px solid var(--border); cursor:pointer; transition:.2s; }
  .panel-item:hover { background:rgba(200,168,96,.04); }
  .panel-item .time { font-size:12px; color:var(--sub); }
  .panel-item .name { font-size:14px; font-weight:500; margin-top:4px; color:var(--text); }

  @media (max-width: 640px) {
    .grid { grid-template-columns:1fr; }
    .panel { width:100%; }
    .controls { flex-direction:column; align-items:stretch; }
    .actions { justify-content:center; }
    header h1 { font-size: 26px; }
    .stats { gap: 32px; }
    .stat-num { font-size: 32px; }
  }
</style>
</head>
<body>

<canvas id="bg"></canvas>
<div class="nebula"></div>

<div class="container">
  <header>
    <h1>小红书热点收集器<span class="star"></span></h1>
    <p>在信息星海中，找到属于你的信号</p>
  </header>

  <div class="controls">
    <div class="kw-bar" id="kwBar"></div>
    <div class="actions">
      <button class="btn-crawl" id="btnCrawl" onclick="startCrawl()">开始采集</button>
      <button class="btn-history" onclick="toggleHistory()">历史</button>
    </div>
  </div>

  <div class="status-bar" id="statusBar"><span class="pulse"></span><span id="statusText"></span></div>

  <div class="sort-bar" id="sortBar">
    <button onclick="sortBy('likes', this)" class="on">点赞</button>
    <button onclick="sortBy('collects', this)">收藏</button>
    <button onclick="sortBy('comments', this)">评论</button>
  </div>

  <div class="stats" id="stats">
    <div class="stat-item"><div class="stat-num" id="statTotal">—</div><div class="stat-label">总条数</div></div>
    <div class="stat-item"><div class="stat-num" id="statKw">—</div><div class="stat-label">关键词</div></div>
    <div class="stat-item"><div class="stat-num hot" id="statTop">—</div><div class="stat-label">最高点赞</div></div>
  </div>

  <div class="grid" id="grid"></div>
  <div class="empty-state" id="empty">
    <div class="empty-orb"></div>
    <p>点击「开始采集」，捕捉你的第一颗星辰</p>
  </div>
</div>

<div class="overlay" id="overlay" onclick="toggleHistory()"></div>
<div class="panel" id="panel">
  <div class="panel-header">
    <strong>历史记录</strong>
    <button class="panel-close" onclick="toggleHistory()">&times;</button>
  </div>
  <div id="panelList"></div>
</div>

<script>
(function() {
  const c = document.getElementById('bg');
  const ctx = c.getContext('2d');
  let w, h, stars = [];
  const STAR_N = 130;
  let mx = -999, my = -999, nebulaBlobs = [];
  const NEBULA_N = 4;

  function resize() { w = c.width = window.innerWidth; h = c.height = window.innerHeight; seedAll(); }
  resize(); window.addEventListener('resize', resize);
  document.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });
  document.addEventListener('mouseleave', () => { mx = -999; my = -999; });

  function seedNebula() {
    nebulaBlobs = [];
    for (let i=0; i<NEBULA_N; i++) {
      nebulaBlobs.push({
        x: Math.random()*w, y: Math.random()*h,
        r: Math.random()*180+80,
        vx: (Math.random()-.5)*0.08, vy: (Math.random()-.5)*0.08,
        hue: Math.random()<.5 ? 40 : 210,
        alpha: Math.random()*.015+.005
      });
    }
  }

  function seedAll() {
    stars = [];
    for (let i=0; i<STAR_N; i++) {
      const rnd = Math.random();
      stars.push({
        x: Math.random()*w, y: Math.random()*h,
        r: rnd<.04 ? Math.random()*2.8+1.8 : rnd<.15 ? Math.random()*1.5+.6 : Math.random()*.9+.2,
        twinkle: Math.random()*Math.PI*2,
        speed: Math.random()*.02+.003,
        hue: rnd<.3 ? 210 : rnd<.6 ? 42 : 0,
        baseAlpha: Math.random()*.25+.12
      });
    }
    seedNebula();
  }

  function draw() {
    ctx.clearRect(0,0,w,h);

    for (const nb of nebulaBlobs) {
      nb.x += nb.vx; nb.y += nb.vy;
      if (nb.x<-200) nb.x = w+200; if (nb.x>w+200) nb.x = -200;
      if (nb.y<-200) nb.y = h+200; if (nb.y>h+200) nb.y = -200;
      const grad = ctx.createRadialGradient(nb.x,nb.y,0, nb.x,nb.y,nb.r);
      const c = nb.hue===40 ? `200,168,96` : `120,150,200`;
      grad.addColorStop(0, `rgba(${c},${nb.alpha})`);
      grad.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = grad;
      ctx.fillRect(nb.x-nb.r, nb.y-nb.r, nb.r*2, nb.r*2);
    }

    for (let i=0; i<STAR_N; i++) {
      const s = stars[i];
      s.twinkle += s.speed;
      const dx = s.x-mx, dy = s.y-my;
      const hoverDist = Math.sqrt(dx*dx+dy*dy);
      const glow = hoverDist < 220 ? Math.pow(1-hoverDist/220, 2)*2 : 0;
      const r = s.r + glow*2;
      const alpha = Math.min(1, s.baseAlpha + Math.sin(s.twinkle)*.1 + glow*.4);

      const h = s.hue;
      const rgb = h===210 ? '160,180,220' : h===42 ? '220,200,150' : '215,210,195';
      ctx.beginPath();
      ctx.arc(s.x, s.y, r, 0, Math.PI*2);
      ctx.fillStyle = `rgba(${rgb},${Math.max(0.04, alpha)})`;
      ctx.fill();

      if (r > 1.2 || glow > .15) {
        const glowR = r*4;
        const glowGrad = ctx.createRadialGradient(s.x,s.y,0, s.x,s.y,glowR);
        glowGrad.addColorStop(0, `rgba(${rgb},${Math.max(0.02, alpha*.2)})`);
        glowGrad.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.beginPath();
        ctx.arc(s.x, s.y, glowR, 0, Math.PI*2);
        ctx.fillStyle = glowGrad;
        ctx.fill();
      }
    }

    for (let i=0; i<STAR_N; i++) {
      const a = stars[i];
      for (let j=i+1; j<STAR_N; j++) {
        const b = stars[j];
        const dx = a.x-b.x, dy = a.y-b.y, dist = Math.sqrt(dx*dx+dy*dy);
        const adx = a.x-mx, ady = a.y-my, adist = Math.sqrt(adx*adx+ady*ady);
        const bdist = Math.sqrt((b.x-mx)**2+(b.y-my)**2);
        const near = Math.min(adist, bdist);
        const maxDist = near<200 ? 160 : 100;
        const baseAlpha = near<200 ? 0.14 : 0.04;
        const baseWidth = near<200 ? 0.8 : 0.2;

        if (dist < maxDist && (a.r>0.8 || b.r>0.8 || near<200)) {
          const a1 = baseAlpha*(1-dist/maxDist);
          ctx.beginPath();
          ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y);
          ctx.strokeStyle = `rgba(200,168,96,${a1})`;
          ctx.lineWidth = baseWidth;
          ctx.stroke();
        }
      }
    }

    requestAnimationFrame(draw);
  }
  draw();
})();

let keywords = ['AI','认知升级','个人成长'];
let allNotes = [];
let sortKey = 'likes';

async function loadConfig() {
  try {
    const r = await fetch('/api/config');
    const cfg = await r.json();
    if (cfg.keywords?.length) keywords = cfg.keywords;
  } catch(e) {}
  renderKw();
}
function saveConfig() {
  fetch('/api/config', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({keywords})
  });
}
function renderKw() {
  document.getElementById('kwBar').innerHTML = keywords.map((k,i) =>
    `<span class="kw-tag" onclick="editKw(${i})">${k}<span class="del" onclick="event.stopPropagation();delKw(${i})">&times;</span></span>`
  ).join('') + `
    <span class="kw-add">
      <input id="kwInput" placeholder="添加关键词" onkeydown="if(event.key==='Enter')addKw()">
      <button onclick="addKw()">+</button>
    </span>`;
}
function addKw() {
  const inp = document.getElementById('kwInput');
  const v = inp.value.trim();
  if (v && !keywords.includes(v)) { keywords.push(v); renderKw(); saveConfig(); }
  inp.value = '';
}
function delKw(i) { keywords.splice(i,1); renderKw(); saveConfig(); }
function editKw(i) {
  const n = prompt('修改关键词', keywords[i]);
  if (n?.trim()) { keywords[i] = n.trim(); renderKw(); saveConfig(); }
}

async function startCrawl() {
  const btn = document.getElementById('btnCrawl');
  const bar = document.getElementById('statusBar');
  const txt = document.getElementById('statusText');
  btn.disabled = true;
  bar.classList.add('active');
  txt.textContent = `正在采集 ${keywords.length} 个关键词...`;

  try {
    const r = await fetch('/api/crawl', { method:'POST' });
    const data = await r.json();
    bar.classList.remove('active');
    if (!data.ok) { txt.textContent = data.error; return; }
    txt.textContent = `采集完成，捕获 ${data.total} 条信号`;
    allNotes = data.notes;
    render(allNotes);
  } catch(e) {
    bar.classList.remove('active');
    txt.textContent = '连接失败，请确认服务已启动';
  } finally {
    btn.disabled = false;
  }
}

function sortBy(key, el) {
  sortKey = key;
  document.querySelectorAll('.sort-bar button').forEach(b => b.classList.remove('on'));
  el.classList.add('on');
  render(allNotes);
}

function render(notes) {
  const grid = document.getElementById('grid');
  const empty = document.getElementById('empty');
  const stats = document.getElementById('stats');
  const sortBar = document.getElementById('sortBar');

  if (!notes.length) {
    grid.innerHTML = '';
    empty.style.display = 'block';
    stats.style.display = 'none';
    sortBar.style.display = 'none';
    return;
  }

  empty.style.display = 'none';
  stats.style.display = 'flex';
  sortBar.style.display = 'flex';

  const ranked = [...notes].sort((a,b) => (b[sortKey]||0) - (a[sortKey]||0));

  document.getElementById('statTotal').textContent = ranked.length;
  document.getElementById('statKw').textContent = [...new Set(ranked.map(n=>n.keyword))].length;
  document.getElementById('statTop').textContent = fmtNum(Math.max(...ranked.map(n=>n.likes||0)));

  grid.innerHTML = ranked.map((n, i) => {
    const rankClass = i === 0 ? 'top1' : i === 1 ? 'top2' : i === 2 ? 'top3' : '';
    const desc = (n.desc||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/`/g,'&#96;').replace(/\$\{/g,'&#36;{');
    const hasDesc = desc.length > 10;
    const coverHtml = n.cover
      ? `<img class="card-cover" src="${n.cover}" loading="lazy" onerror="this.replaceWith(coverFallback())">`
      : `<div class="card-cover-fallback">&#9670;</div>`;
    return `
      <div class="card" style="transition-delay:${i*0.03}s" class="${hasDesc?'has-desc':''}" style="transition-delay:${i*0.03}s">
        <div class="card-rank ${rankClass}">${i+1}</div>
        ${coverHtml}
        <div class="card-body" onclick="event.stopPropagation();this.parentElement.classList.toggle('expanded')">
          <div class="card-title">${n.title||'(无标题)'}</div>
          <div class="card-meta">
            <span>${fmtNum(n.likes||0)} 赞</span>
            <span>${fmtNum(n.collects||0)} 藏</span>
            <span>${fmtNum(n.comments||0)} 评</span>
          </div>
          <div class="card-footer">
            <span class="card-author"><em>@</em>${n.author||'未知'}</span>
            <span class="card-kw">${n.keyword||''}</span>
          </div>
          ${hasDesc ? `<div class="card-desc">${desc}</div><div class="card-expand-hint">展开阅读</div>` : `<a class="card-ext-link" href="${n.url||'#'}" target="_blank" onclick="event.stopPropagation()">查看原文</a>`}
        </div>
      </div>`;
  }).join('');

  requestAnimationFrame(() => {
    grid.querySelectorAll('.card').forEach((c, i) => {
      setTimeout(() => c.classList.add('visible'), i * 60);
    });
  });
}

function coverFallback() {
  const el = document.createElement('div');
  el.className = 'card-cover-fallback';
  el.innerHTML = '&#9670;';
  return el;
}

function fmtNum(n) {
  if (n >= 10000) return (n/10000).toFixed(1)+'w';
  if (n >= 1000) return (n/1000).toFixed(1)+'k';
  return String(n);
}

async function toggleHistory() {
  const overlay = document.getElementById('overlay');
  const panel = document.getElementById('panel');
  const show = !panel.classList.contains('show');
  overlay.classList.toggle('show', show);
  panel.classList.toggle('show', show);
  if (show) {
    const r = await fetch('/api/history');
    const data = await r.json();
    document.getElementById('panelList').innerHTML = data.map(d =>
      `<div class="panel-item" onclick="loadHistory('${d.name}')">
        <div class="time">${new Date(d.time).toLocaleString('zh-CN')}</div>
        <div class="name">${d.name}</div>
      </div>`
    ).join('') || '<div style="padding:20px;color:var(--sub);text-align:center">暂无历史</div>';
  }
}

async function loadHistory(name) {
  toggleHistory();
  const r = await fetch('/api/history/' + name);
  const data = await r.json();
  if (data.ok) { allNotes = data.notes; render(allNotes); }
}

async function loadLatest() {
  const r = await fetch('/api/history');
  const data = await r.json();
  if (data.length) {
    const latest = await fetch('/api/history/' + data[0].name);
    const d = await latest.json();
    if (d.ok && d.notes.length) { allNotes = d.notes; render(allNotes); }
  }
}

loadConfig();
loadLatest();
